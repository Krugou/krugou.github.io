name: 🧱 Yet Another Deploy — Pray It Works This Time

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_FIREBASE_API_KEY: 'AIzaSyDQKYiEaLVmPBt9L-H2X-D7b_z2ENfu55I'
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'immigrants-game.firebaseapp.com'
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'immigrants-game'
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'immigrants-game.firebasestorage.app'
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '341726953439'
  NEXT_PUBLIC_FIREBASE_APP_ID: '1:341726953439:web:33f0add1b7b56353904e6a'
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: 'G-KD65KP4YST'
  NODE_VERSION: '22'

jobs:
  # ── Quality Gate ────────────────────────────────────────────────────────────
  quality:
    name: 🔍 Pretending To Care — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:quiet

      - name: Unit tests
        run: npm run test:unit

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Stack It & Pray — Build Next.js
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Build with Next.js
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/out

  # ── GitHub Pages Deploy ──────────────────────────────────────────────────────
  deploy-pages:
    name: 🌍 Dumping Files On The Internet — GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Firebase Hosting Deploy ──────────────────────────────────────────────────
  deploy-firebase:
    name: 🔥 Lighting Money On Fire — Firebase Hosting
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IMMIGRANTS_GAME }}
          channelId: live
          projectId: immigrants-game
